<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Edit Task</h1>
        <form action="/edit/{{ todo.id }}" method="POST">
            <input class="form-control" type="text" name="task" value="{{ todo.task }}" required>
            <button type="submit" class="btn btn-primary mt-2">Update Task</button>
        </form>
    </div>
</body>
</html>
